spring.application.name=restapi

# --------------------------------------------------
# DATABASE CONFIG (PostgreSQL)
# --------------------------------------------------
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=

# Optional: Logging SQL ???? execute
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.namedparam=DEBUG

# Optional: HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JWT Configuration
jwt.secret=a-string-secret-at-least-256-bits-long
jwt.issuer=https://api.mikan-app.com

file.upload-dir=uploads/images
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB